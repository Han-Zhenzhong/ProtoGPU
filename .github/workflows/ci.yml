name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential

      - name: Run unit tests
        env:
          CONFIG: Release
        run: |
          bash scripts/run_unit_tests.sh build

  integration-tests:
    name: Integration Tests (Linux)
    runs-on: ubuntu-latest
    needs: unit-tests
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential clang

      - name: Run integration tests
        env:
          CONFIG: Release
        run: |
          bash scripts/run_integration_tests.sh build

      - name: Upload test outputs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-out
          path: build/test_out
          if-no-files-found: ignore
